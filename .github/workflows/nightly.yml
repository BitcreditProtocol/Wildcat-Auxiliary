name: build and push nightly images

on:
  push:
    branches:
      #- master
      - "**" # testing
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
    PROJECT_ID: "bitcr-shared"
    GAR_LOCATION: "europe-west1"
    REPOSITORY: "bitcr-wildcat-dev"
    GAR_PATH: "europe-west1-docker.pkg.dev/bitcr-shared/bitcr-wildcat-dev"
    # wildcat-auxiliary settings
    BASE_IMAGE_NAME: "wildcat-auxiliary/base-image"
    BASE_TAR: "base-image.tar"

jobs:

  base-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

    - name: Authenticate to GCP
      id: auth
      uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
      with:
        workload_identity_provider: ${{ secrets.GCLOUD_WIF_PROVIDER }}
        service_account: ${{ secrets.GCLOUD_SERVICE_ACCOUNT }}
        token_format: access_token

    - name: Auth w/ GAR
      uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
      with:
        registry: ${{ env.GAR_LOCATION }}-docker.pkg.dev
        username: oauth2accesstoken
        password: ${{ steps.auth.outputs.access_token }}

    - name: Login to GHCR
      uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

    - name: Build base image (cache, docker image tarball output for upload)
      uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
      with:
        context: .
        file: docker/base-image/Dockerfile
        platforms: linux/amd64
        tags: ${{ env.BASE_IMAGE_NAME }}
        push: false
        outputs: type=docker,dest=${{ env.BASE_TAR }},name=${{ env.BASE_IMAGE_NAME }}
        cache-from: |
          type=registry,ref=${{ env.GAR_PATH }}/${{ env.BASE_IMAGE_NAME }}:buildcache
          type=gha,scope=${{ github.repository }}/${{ env.BASE_IMAGE_NAME }}
        cache-to: |
          type=registry,ref=${{ env.GAR_PATH }}/${{ env.BASE_IMAGE_NAME }}:buildcache,mode=max
          type=gha,mode=max,scope=${{ github.repository }}/${{ env.BASE_IMAGE_NAME }}


    - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
      with:
        name: base-image
        path: "${{ env.BASE_TAR }}"
        retention-days: 1

# ───────────────────────────────
# build & push wildcat auxiliary images
# ───────────────────────────────
  wildcat-aux-images:
    needs: base-image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
      attestations: write
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        service:
          - name: bcr-wdc-eic-service
            dockerfile: docker/eic-service/Dockerfile
          - name: bcr-wdc-ens-service
            dockerfile: docker/ens-service/Dockerfile

    steps:
    - name: Checkout code
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

    - name: Authenticate to GCP
      id: auth
      uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
      with:
        workload_identity_provider: ${{ secrets.GCLOUD_WIF_PROVIDER }}
        service_account: ${{ secrets.GCLOUD_SERVICE_ACCOUNT }}
        token_format: access_token

    - name: Auth w/ GAR
      uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
      with:
        registry: ${{ env.GAR_LOCATION }}-docker.pkg.dev
        username: oauth2accesstoken
        password: ${{ steps.auth.outputs.access_token }}

    - name: Login to GHCR
      uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Docker Buildx
      id: buildx
      uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1


    - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
      with:
        name: base-image
        path: .

    - name: Load base image
      run: docker load -i "${BASE_TAR}"

    - id: meta
      name: Metadata for ${{ matrix.service.name }}
      uses: docker/metadata-action@318604b99e75e41977312d83839a89be02ca4893 # v5.9.0
      with:
        images: |
          ${{ env.GAR_PATH }}/${{ matrix.service.name }}
          ghcr.io/${{ github.repository_owner }}/${{ matrix.service.name }}
        tags: |
          type=raw,value=nightly

    - id: push
      name: Build & push ${{ matrix.service.name }}
      uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
      with:
        context: .
        file: ${{ matrix.service.dockerfile }}
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        provenance: mode=min
        cache-from: |
          type=registry,ref=${{ env.GAR_PATH }}/${{ matrix.service.name }}:buildcache
          type=gha,scope=${{ github.repository }}/${{ matrix.service.name }}
        cache-to: |
          type=registry,ref=${{ env.GAR_PATH }}/${{ matrix.service.name }}:buildcache,mode=max
          type=gha,mode=max,scope=${{ github.repository }}/${{ matrix.service.name }}